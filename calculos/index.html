<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maskos</title>
</head>
<body>
    <div>
        <h1>Quantos maskos você merece?</h1>
        <label for="n1">Insira o número de maskos desejados:</label><br>
        <input type="number" name="mask" id="n1"><br>
        <label for="n2">Insira os kasvos que serão investidos nos maskos:</label><br>
        <input type="number" name="mask" id="n2"><br>
        <button onclick="multiplicar()">Conclua</button>
        <p id="res"></p>
    </div>
    <div>
        <h1>Quantos lescos você deve ter?</h1>
        <label for="n3">Quantos kasvos você tem?</label><br>
        <input type="number" name="lesc" id="3"><br>
        <label for="n4">Quantos phagos você possui?:</label><br>
        <input type="number" name="phag" id="n4"><br>
        <button onclick="dividir()">Conclua</button>
        <p id="resp"></p>
    </div>


    <script src="script.js"></script>   
</body>
</html>
